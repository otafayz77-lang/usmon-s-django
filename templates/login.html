{% extends 'base.html' %} {% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <!-- Logo / Sarlavha -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Xush kelibsiz</h1>
      <p class="text-sm text-gray-500 mt-1">Hisobingizga kiring</p>
    </div>

    <div
      class="bg-white border border-gray-200 rounded-2xl shadow-sm px-6 py-8"
    >
      {% if error %}
      <div
        class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-5"
      >
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1.5"
            >Email</label
          >
          <input
            name="email"
            type="email"
            placeholder="example@mail.com"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            required
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1.5"
            >Parol</label
          >
          <input
            name="password"
            type="password"
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-indigo-700 active:scale-95 transition"
        >
          Kirish
        </button>
      </form>
    </div>

    <p class="text-center mt-5 text-sm text-gray-500">
      Hisob yo'qmi?
      <a
        href="{% url 'register' %}"
        class="text-indigo-600 font-semibold hover:underline"
      >
        Ro'yxatdan o'tish
      </a>
    </p>
  </div>
</div>

{% endblock %}
