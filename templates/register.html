{% extends 'base.html' %} {% block content %}

<div class="w-full max-w-xs mx-auto mt-10">
  <form
    method="POST"
    action="{% url 'register' %}"
    class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4"
  >
    {% csrf_token %}

    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
    {% endif %}

    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2">Email</label>
      <input
        name="email"
        type="email"
        placeholder="Email"
        class="border w-full p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2">Parol</label>
      <input
        name="password"
        type="password"
        placeholder="Parol"
        class="border w-full p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-semibold mb-2">Parolni tasdiqlang</label>
      <input
        name="confirm_password"
        type="password"
        placeholder="Parolni tasdiqlang"
        class="border w-full p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />
    </div>

    <button
      type="submit"
      class="bg-blue-500 text-white px-4 py-2 rounded w-full font-semibold hover:bg-blue-600 transition"
    >
      Ro'yxatdan o'tish
    </button>

    <p class="text-center mt-4 text-gray-600">
      Allaqachon hisob bor? <a href="{% url 'login' %}" class="text-blue-500 font-semibold hover:underline">Kirish</a>
    </p>
  </form>
</div>

{% endblock %}
