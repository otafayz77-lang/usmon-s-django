{% extends 'base.html' %} {% block content %}

<div class="max-w-lg mx-auto px-4 py-10">
  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 sm:p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Sotib olish</h1>

    {% if error %}
    <div
      class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-5"
    >
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <!-- Joylashuv -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5"
          >Joylashuv</label
        >
        <input
          type="text"
          name="location"
          placeholder="Shahar, Ko'cha, Uy raqami"
          required
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <p class="text-xs text-gray-400 mt-1">
          Mahsulot shu manzilga yetkaziladi
        </p>
      </div>

      <!-- To'lov usuli -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5"
          >To'lov usuli</label
        >
        <select
          name="payment"
          required
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <option value="">Tanlang...</option>
          <option value="Naqd pul">Naqd pul</option>
          <option value="Card">Karta</option>
          <option value="Bank transfer">Bank o'tkazmasi</option>
          <option value="Online">Online</option>
        </select>
      </div>

      <!-- Savat xulosa -->
      <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4">
        <h3 class="text-sm font-semibold text-indigo-800 mb-1">
          Savat ma'lumoti
        </h3>
        <p class="text-xs text-indigo-600">
          Savatdagi barcha mahsulotlar ko'rsatilgan manzilga yetkaziladi.
        </p>
      </div>

      <!-- Tugmalar -->
      <div class="flex gap-3 pt-1">
        <a
          href="{% url 'basket' %}"
          class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl hover:bg-gray-200 active:scale-95 transition font-semibold text-sm text-center"
        >
          Orqaga
        </a>
        <button
          type="submit"
          class="flex-1 bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition font-semibold text-sm"
        >
          Tasdiqlash
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
