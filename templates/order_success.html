{% extends 'base.html' %} {% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm text-center">
    <div
      class="bg-white border border-gray-200 rounded-2xl shadow-sm px-6 py-10"
    >
      <!-- Icon -->
      <div
        class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-5"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          fill="none"
          viewBox="0 0 24 24"
          stroke="#16a34a"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M5 13l4 4L19 7"
          />
        </svg>
      </div>

      <h1 class="text-2xl font-bold text-gray-800 mb-2">
        Buyurtma qabul qilindi!
      </h1>
      <p class="text-sm text-gray-500 mb-8">
        Buyurtmangiz muvaffaqiyatli joylashtirildi. Tez orada siz bilan
        bog'lanamiz.
      </p>

      <a
        href="{% url 'home' %}"
        class="block w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition font-semibold text-sm"
      >
        Asosiy sahifaga qaytish
      </a>

      <a
        href="{% url 'profil' %}"
        class="block w-full bg-gray-100 text-gray-700 py-3 rounded-xl hover:bg-gray-200 active:scale-95 transition font-semibold text-sm mt-3"
      >
        Buyurtmalarimni ko'rish
      </a>
    </div>
  </div>
</div>

{% endblock %}
