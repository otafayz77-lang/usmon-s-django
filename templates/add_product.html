{% extends 'base.html' %} {% block content %}

<div class="min-h-screen bg-white py-12 px-4">
  <div class="max-w-3xl mx-auto">
    <div class="bg-white shadow-2xl rounded-3xl border border-gray-100 p-8">
      <h1 class="text-4xl font-bold text-gray-900 text-center mb-10">
        Yangi Mahsulot Qo‘shish
      </h1>

      <form
        method="POST"
        action="{% url 'add_product' %}"
        enctype="multipart/form-data"
        class="space-y-6"
      >
        {% csrf_token %}

        <div>
          <label class="block text-gray-700 font-semibold mb-2">
            Mahsulot Nomi
          </label>
          <input
            type="text"
            name="nomi"
            placeholder="Mahsulot nomini kiriting"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">
            Tavsif
          </label>
          <input
            type="text"
            name="desc"
            placeholder="Qisqacha tavsif yozing"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">
            Kategoriya
          </label>
          <select
            name="kategoriya"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          >
            <option value="">Kategoriya tanlang</option>
            {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">
            Batafsil Ma'lumot
          </label>
          <textarea
            name="malumoti"
            rows="5"
            placeholder="Mahsulot haqida to‘liq ma'lumot yozing"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">
            Narxi ($)
          </label>
          <input
            type="number"
            name="narxi"
            placeholder="Narxini kiriting"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <div>Yili</label>
          <input
            type="date"
            name="yili"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>Rasm</label>
          <input
            type="file"
            name="rasmi"
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 bg-white"
            required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 bg-white"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-semibold shadow-lg transition"
        >
          Mahsulot Qo‘shish
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
