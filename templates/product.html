{% extends 'base.html' %} {% block content %}

<div
  class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8"
>
  {% for product in products %}
  <div
    class="group relative border rounded-lg p-3 shadow-sm hover:shadow-lg transition"
  >
    <img
      src="{{ product.Rasmi.url }}"
      alt="{{ product.Nomi }}"
      class="aspect-square w-full rounded-md bg-gray-200 object-cover group-hover:opacity-75 lg:h-80"
    />

    <div class="mt-4 flex justify-between items-start">
      <div>
        <h3 class="text-sm text-gray-700 font-semibold">{{ product.Nomi }}</h3>

        <p class="mt-1 text-sm text-gray-500">
          {{ product.Malumoti|truncatewords:5 }}
        </p>
      </div>

      <p class="text-sm font-medium text-gray-900">{{ product.Narxi }}$</p>
    </div>
    <div class="mt-3">
      <a
        href="{% url 'detail' product.id %}"
        class="block text-center bg-blue-600 text-white text-sm py-2 rounded-md hover:bg-blue-700 transition"
      >
        Ko‘rish
      </a>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock content %}
