<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Website{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex-shrink-0 flex items-center">
            <a href="/" class="text-2xl font-bold text-indigo-600"
              >Usmon's django</a
            >
          </div>

          <!-- Search Bar -->
          <div class="flex-1 flex items-center justify-center px-6">
            <input
              type="search"
              placeholder="Search products..."
              class="w-full max-w-sm rounded-full border-gray-300 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>

          <!-- Nav Links -->
          <div class="flex items-center space-x-4">
            <a href="{% url 'home' %}" class="text-gray-700 hover:text-indigo-600"
              >Bosh sahifa</a
            >
            <a href="{% url 'profil' %}" class="text-gray-700 hover:text-indigo-600"
              >Profil</a
            >
            <a
              href="#"
              class="p-2 rounded-full text-gray-400 hover:text-indigo-600"
            >
              <span class="sr-only">Cart</span>
            </a>
            {% if not user.is_authenticated %}
            <a
              href="{% url 'register' %}"
              class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-700"
            >
              Register
            </a>
            {% else %}
            <form action="{% url 'logout' %}" method="post">
              {% csrf_token %}
              <button
                type="submit"
                class="bg-red-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-red-700"
              >
                Logout
              </button>
            </form>
            </a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    {% block content %} {% endblock %}

    <footer
      class="bg-neutral-primary-soft rounded-base shadow-xs border border-default m-4"
    >
      <div
        class="w-full mx-auto max-w-screen-xl p-4 md:flex md:items-center md:justify-between"
      >
        <span class="text-sm text-body sm:text-center"
          >© 2023
          <a href="https://flowbite.com/" class="hover:underline">Flowbite™</a>.
          All Rights Reserved.
        </span>
        <ul
          class="flex flex-wrap items-center mt-3 text-sm font-medium text-body sm:mt-0"
        >
          <li>
            <a href="#" class="hover:underline me-4 md:me-6">About</a>
          </li>
          <li>
            <a href="#" class="hover:underline me-4 md:me-6">Privacy Policy</a>
          </li>
          <li>
            <a href="#" class="hover:underline me-4 md:me-6">Licensing</a>
          </li>
          <li>
            <a href="#" class="hover:underline">Contact</a>
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
